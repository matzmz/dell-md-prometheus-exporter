name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build static release binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -buildvcs=false -o dist/dell-md-exporter-linux-amd64 ./cmd/dell_md_exporter

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dell-md-exporter-linux-amd64
          generate_release_notes: true
